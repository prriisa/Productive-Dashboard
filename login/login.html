<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack Pro</title>
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <login>
        <div class="login-container">
            <h1>Welcome Back</h1>
            <p>login to FinTrack Pro</p>
            <form action="">
                <label for="username">Username</label>
                <input required type="text" id="username" placeholder="Enter your Username">
                <label for="password">Password</label>
                <input required type="text" id="password" placeholder="Enter your Password">
                <input type="submit" value="Login">
                <p>Don't have an account? <a href="../register/register.html">Login here</a></p>
            </form>
        </div>
    </login>
    <script src="../assets/js/main.js"></script>
    <script src="login.js"></script>


    
</body>
</html>
